name: PR Slack Bildirimi

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Slack'e PR bildirimi gönder
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Body'den ilk 500 karakteri al (çok uzun olmasın)
          SUMMARY=$(echo "$PR_BODY" | head -c 500)

          # Slack mesajını oluştur
          PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🔀 Yeni PR Açıldı",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Başlık:*\n${PR_TITLE}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n\`${PR_BRANCH}\`"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Özet:*\n${SUMMARY}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "📋 PR'ı Görüntüle",
                      "emoji": true
                    },
                    "url": "${PR_URL}",
                    "style": "primary"
                  }
                ]
              }
            ]
          }
          EOFPAYLOAD
          )

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
