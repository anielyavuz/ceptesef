        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            background: rgba(244, 251, 246, 0.8);
            backdrop-filter: blur(20px);

        .option-card:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }
        .option-card-active {
            background-color: #ffffff;

    body {

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Shell Component) -->
<header class="glass-header sticky top-0 z-50 px-6 py-4 flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-title-lg font-semibold tracking-tight">Meal Planner</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden">
<img class="w-full h-full object-cover" data-alt="User profile portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8NEvXcNIjUS74wwDtu40T7ppDpDnEE0dCYDppMjM4vJlAOFvovhZ2QaW_7aGyS-w2fCw6c9gW3QUakODuM2N96SXESIfzPFrjW0jFDAaEayXaZjCJSl9s8sEg5RyGzs5JpSMSoR1MzpeIO6NFP2o7nUZ5OU4so72LJPDoWouyyFnEvGYx_Gt0-IRQYI8QpUw94h0OKQnfsKzPqvLfU0-8FUylOoM4Dx6vx1Y1gqVBNdFW30bQTi6ZuaWI-qGr_-PTdR4Cqgrstw4"/>
</div>
</header>
<!-- Progress Bar (Shared Component - Updated to 85% as per logical flow) -->
<div class="px-6 py-4">
<div class="flex justify-between items-center mb-2">
<span class="text-label-md font-medium text-on-surface-variant">Onboarding Progress</span>
<span class="text-label-md font-bold text-primary">85%</span>
</div>
<div class="w-full bg-surface-container-high h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full transition-all duration-500" style="width: 85%;"></div>
</div>
</div>
<!-- Main Content (Creative Canvas) -->
<main class="flex-grow px-6 pb-24">
<div class="mt-8 mb-10 max-w-2xl mx-auto">
<span class="text-primary font-bold tracking-widest text-label-sm uppercase mb-2 block">Öğün Tercihleri</span>
<h2 class="text-display-sm font-extrabold text-on-surface tracking-tight mb-4">Günde kaç öğün beslenirsiniz?</h2>
<p class="text-body-lg text-on-surface-variant leading-relaxed">Yaşam tarzınıza en uygun öğün düzenini seçin, listenizi ona göre hazırlayalım.</p>
</div>
<!-- Bento Grid of Meal Options -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto">
<!-- Option 1: Standard -->
<button class="option-card group relative p-6 rounded-lg bg-surface-container-low transition-all text-left flex flex-col justify-between min-h-[160px]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-fixed" data-icon="restaurant">restaurant</span>
</div>
<div class="opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<div>
<h3 class="text-title-lg font-bold text-on-surface mb-1">Standart (3 Öğün)</h3>
<p class="text-body-sm text-on-surface-variant">Kahvaltı, Öğle, Akşam</p>
</div>
</button>
<!-- Option 2: Minimal -->
<button class="option-card group relative p-6 rounded-lg bg-surface-container-low transition-all text-left flex flex-col justify-between min-h-[160px]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed" data-icon="light_mode">light_mode</span>
</div>
<div class="opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle">check_circle</span>
</div>
</div>
<div>
<h3 class="text-title-lg font-bold text-on-surface mb-1">Minimal (2 Öğün)</h3>
<p class="text-body-sm text-on-surface-variant">Kahvaltı, Akşam</p>
</div>
</button>
<!-- Option 3: Intense -->
<button class="option-card group relative p-6 rounded-lg bg-surface-container-low transition-all text-left flex flex-col justify-between min-h-[160px]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-tertiary-fixed" data-icon="bolt">bolt</span>
</div>
<div class="opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle">check_circle</span>
</div>
</div>
<div>
<h3 class="text-title-lg font-bold text-on-surface mb-1">Yoğun (5 Öğün)</h3>
<p class="text-body-sm text-on-surface-variant">Kahvaltı, Öğle, Akşam + 2 Ara Öğün</p>
</div>
</button>
<!-- Option 4: Flexible -->
<button class="option-card group relative p-6 rounded-lg bg-surface-container-low transition-all text-left flex flex-col justify-between min-h-[160px]">
<div class="flex justify-between items-start">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="all_inclusive">all_inclusive</span>
</div>
<div class="opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="check_circle">check_circle</span>
</div>
</div>
<div>
<h3 class="text-title-lg font-bold text-on-surface mb-1">Esnek</h3>
<p class="text-body-sm text-on-surface-variant">Sadece ana öğünler ve sağlıklı atıştırmalıklar</p>
</div>
</button>
</div>
<!-- Visual Anchor: Editorial Kitchen Feel -->
<div class="mt-12 max-w-2xl mx-auto overflow-hidden rounded-xl relative h-48">
<img class="w-full h-full object-cover" data-alt="Top down view of healthy meal prep containers" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9WC70OOlKZ9t7LUTVIvaPJH89Xi23P386bha2QZTG1uCMbBp6nkhXN9-cOpcOKS39HPD9sy28mUnIxMRuBvaeFPmM242q6GJn1kY4pyufgXoTqRJqEiEpD-edZxli0vL67e8Kkbvf91VWCvV_4GtGt0pEM-XvZhL-kpFCL78GUlgrvZEoYvPxTVrFLQ7DJQj2mcs4j4A-CbvY_vtiOlX_A7vvOZIrSwBo10mO4uplY5v2z6wkavUVtmdjNqxe71DHIOpss9tRlIA"/>
<div class="absolute inset-0 bg-gradient-to-t from-on-surface/60 to-transparent flex items-end p-6">
<p class="text-surface-container-lowest text-body-md font-medium italic">"Düzenli beslenme, mutfaktaki en büyük yardımcınızdır."</p>
</div>
</div>
</main>

<footer class="fixed bottom-0 left-0 right-0 p-6 glass-header flex justify-center">
<div class="w-full max-w-2xl">
<button class="signature-gradient w-full py-4 rounded-full text-on-primary font-bold text-title-md shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                Devam Et
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
